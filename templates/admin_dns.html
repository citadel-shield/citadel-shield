<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DNS Config — Admin</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <main class="admin-main admin-page">
    <nav class="admin-nav">
      <span>citadel-shield // admin // dns</span>
      <a href="{{ url_for('admin_logout') }}">logout</a>
    </nav>

    {% if error %}<div class="login-error" style="max-width:500px;">{{ error }}</div>{% endif %}
    {% if saved %}
    <div style="max-width:500px; background:#0c150c; border:1px solid #2e5527; color:var(--accent); font-size:0.8rem; padding:0.6rem 0.8rem; border-radius:3px;">
      Config saved. Config saved. Restart the coordination server to apply changes.
    </div>
    {% endif %}

    <div class="tool-section" style="max-width:500px; width:100%;">
      <div class="tool-section-header">
        <span class="label">DNS SETTINGS</span>
      </div>
      <form method="POST" style="display:flex; flex-direction:column; gap:1rem;">
        <div>
          <label class="dns-label">MagicDNS</label>
          <label style="font-size:0.85rem; color:var(--text); cursor:pointer;">
            <input type="checkbox" name="magic_dns" {% if dns.get('magic_dns') %}checked{% endif %}>
            Enable MagicDNS (resolve devices by hostname)
          </label>
        </div>
        <div>
          <label class="dns-label" for="base_domain">Base domain</label>
          <input type="text" id="base_domain" name="base_domain"
                 value="{{ dns.get('base_domain', '') }}"
                 placeholder="citadel.internal"
                 class="dns-input">
        </div>
        <div>
          <label class="dns-label" for="nameservers">Nameservers <span style="color:var(--text-muted); font-weight:400;">(one per line)</span></label>
          <textarea id="nameservers" name="nameservers" rows="4" class="dns-input"
                    placeholder="1.1.1.1">{{ dns.get('nameservers', {}).get('global', [])|join('\n') }}</textarea>
        </div>
        <button type="submit" class="login-form-btn">Save config</button>
      </form>
    </div>
  </main>
</body>
</html>
