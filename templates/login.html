{% extends "base.html" %}
{% block title %}Log In — Citadel Shield{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-box">
    <h1>Log In</h1>
    {% if error %}<div class="login-error">{{ error }}</div>{% endif %}
    
    <form method="POST" class="login-form">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required>
      
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="your password" required>
      
      <button type="submit">Log In</button>
    </form>
    
    <p style="text-align:center; font-size:0.85rem; color:var(--text-muted); margin-top:1rem;">
      Don't have an account? <a href="/signup" style="color:var(--accent);">Sign up</a>
    </p>
  </div>
</div>
{% endblock %}
